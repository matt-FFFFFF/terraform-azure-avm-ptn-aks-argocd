# Sync Wave 0: ClusterSecretStore
# Points to the raw manifest in components/eso-cluster-secret-store/.
# This runs in the same wave as ESO because it depends on the ESO CRDs
# existing, but Argo CD will retry until the CRDs are available.
# Using SkipDryRunOnMissingResource so the sync doesn't fail when the
# CRD doesn't exist yet during the dry-run phase.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: eso-cluster-secret-store
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: <PLATFORM_GITOPS_REPO_URL>
    path: components/eso-cluster-secret-store
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - SkipDryRunOnMissingResource=true
      - ServerSideApply=true
    retry:
      limit: 10
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
