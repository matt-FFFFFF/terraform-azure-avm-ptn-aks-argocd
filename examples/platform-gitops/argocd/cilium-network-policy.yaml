# Sync Wave 1: Cilium Network Policies
# Creates CiliumNetworkPolicy rules that allow sidecar proxies in any
# namespace to reach istiod for xDS discovery and mTLS certificate
# bootstrap. Without this, Cilium blocks the istio-proxy init container
# from connecting to the control plane, leaving pods stuck in
# PodInitializing.
#
# Deployed in the same wave as istio-base/istiod so the policies exist
# before any meshed workloads are scheduled.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium-network-policy
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: <PLATFORM_GITOPS_REPO_URL>
    path: components/cilium-network-policy
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: aks-istio-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
