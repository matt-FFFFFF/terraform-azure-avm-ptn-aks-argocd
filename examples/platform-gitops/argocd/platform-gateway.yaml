# Sync Wave 2: Gateway API Gateway Resource
# Deploys the platform Gateway resource that configures Istio's
# gateway controller for TLS termination using the wildcard certificate.
# Team HTTPRoutes attach to this Gateway.
#
# This must run after Istio (wave 1) and the TLS secret (wave 2).
# Runs in wave 2 alongside the TLS ExternalSecret — the Gateway
# will become ready once the TLS secret exists.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-gateway
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: <PLATFORM_GITOPS_REPO_URL>
    path: components/gateway
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-ingress
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - SkipDryRunOnMissingResource=true
