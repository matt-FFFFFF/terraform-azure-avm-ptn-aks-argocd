# Sync Wave 2: Istio Gateway
# Deploys a Kubernetes Gateway resource via the Istio gateway chart.
# This creates the ingress load balancer that terminates TLS using
# the wildcard certificate provisioned by ESO.
#
# The Gateway API resources (Gateway, HTTPRoute) are used instead of
# Istio's VirtualService/Gateway CRDs.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istio-gateway
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://istio-release.storage.googleapis.com/charts
    chart: gateway
    targetRevision: 1.24.3
    helm:
      valuesObject:
        service:
          type: LoadBalancer
          annotations:
            service.beta.kubernetes.io/azure-load-balancer-health-probe-request-path: /healthz/ready
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-ingress
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
