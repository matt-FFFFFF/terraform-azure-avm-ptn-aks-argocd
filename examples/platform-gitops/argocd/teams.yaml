# Sync Wave 4: Team Onboarding
# This ApplicationSet discovers team config files under config/teams/*.yaml
# using the git file generator. Each file produces one Application that
# deploys the team-resources Helm chart (components/teams/), creating:
#   - Namespace (with Istio sidecar injection)
#   - AppProject (scoped to team's namespace and repo)
#   - ApplicationSet (watches team's gitops repo for services)
#
# To onboard a new team:
# 1. Create a new YAML file under config/teams/ (e.g. config/teams/team-c.yaml)
# 2. Create the team's gitops repo in Azure DevOps
# 3. Create a managed identity for the team in Terraform (WS1)
# 4. Commit and push — Argo CD handles the rest
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: teams
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - git:
        repoURL: <PLATFORM_GITOPS_REPO_URL>
        revision: main
        files:
          - path: "config/teams/*.yaml"
  template:
    metadata:
      name: "team-{{ `{{ .name }}` }}"
      namespace: argocd
    spec:
      project: default
      source:
        repoURL: <PLATFORM_GITOPS_REPO_URL>
        path: components/teams
        targetRevision: main
        helm:
          valuesObject:
            team:
              name: "{{ `{{ .name }}` }}"
              repoUrl: "{{ `{{ .repoUrl }}` }}"
              identityClientId: "{{ `{{ .identityClientId }}` }}"
              revision: "{{ `{{ .revision }}` }}"
              appPath: "{{ `{{ .appPath }}` }}"

              sharedChartRepoUrl: "{{ `{{ .sharedChartRepoUrl }}` }}"
      destination:
        server: https://kubernetes.default.svc
        namespace: argocd
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - ServerSideApply=true
