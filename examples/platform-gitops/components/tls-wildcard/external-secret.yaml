# ExternalSecret that pulls the wildcard TLS certificate from Azure Key Vault
# and creates a Kubernetes TLS secret in the istio-ingress namespace.
#
# The Key Vault certificate must be stored as a PKCS12 bundle. ESO extracts
# the certificate and private key from the bundle.
#
# The secret name (wildcard-tls) is referenced by the Gateway resource's
# TLS configuration.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: wildcard-tls
  namespace: istio-ingress
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: azure-keyvault
  target:
    name: wildcard-tls
    template:
      type: kubernetes.io/tls
      data:
        tls.crt: "{{ .tls_crt }}"
        tls.key: "{{ .tls_key }}"
  data:
    - secretKey: tls_crt
      remoteRef:
        key: wildcard-tls-cert
        property: tls.crt
    - secretKey: tls_key
      remoteRef:
        key: wildcard-tls-cert
        property: tls.key
