# ClusterSecretStore configures ESO to read secrets from Azure Key Vault
# using workload identity federation. This is cluster-scoped, so any
# ExternalSecret in any namespace can reference it.
#
# The serviceAccountRef points to the ESO controller-manager SA, which has
# a federated identity credential configured in Azure AD.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: azure-keyvault
spec:
  provider:
    azurekv:
      authType: WorkloadIdentity
      vaultUrl: https://<KEYVAULT_NAME>.vault.azure.net/
      serviceAccountRef:
        name: external-secrets
        namespace: external-secrets
