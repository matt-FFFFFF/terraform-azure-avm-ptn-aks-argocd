# Service account for the team's workload identity.
# Pods in the team's namespace can use this SA to authenticate
# to Azure services (e.g., Key Vault, Storage, SQL) via
# workload identity federation.
#
# The team must configure a federated identity credential in
# Azure AD that trusts this service account.
{{- if .Values.team.identityClientId }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: workload-identity
  namespace: {{ .Values.team.name }}
  annotations:
    azure.workload.identity/client-id: {{ .Values.team.identityClientId | quote }}
  labels:
    azure.workload.identity/use: "true"
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/part-of: platform
    platform.example.com/team: {{ .Values.team.name }}
{{- end }}
