# Gateway API Gateway resource for ingress TLS termination.
# Uses the Istio automated deployment model — Istio automatically
# provisions a Deployment, Service, HPA, and PDB for this Gateway.
# The TLS certificate is sourced from the wildcard-tls secret
# created by the ExternalSecret.
#
# Team HTTPRoutes attach to this Gateway via parentRefs.
# ExternalDNS watches this Gateway and the attached HTTPRoutes to
# automatically create DNS records in Azure DNS.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: platform-gateway
  namespace: istio-ingress
spec:
  gatewayClassName: istio
  infrastructure:
    annotations:
      service.beta.kubernetes.io/azure-load-balancer-internal: "true"
      service.beta.kubernetes.io/azure-load-balancer-internal-subnet: "nodeSubnet"
  listeners:
    - name: https
      port: 443
      protocol: HTTPS
      hostname: "*.example.com"
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: wildcard-tls
      allowedRoutes:
        namespaces:
          from: All
    - name: http
      port: 80
      protocol: HTTP
      hostname: "*.example.com"
      allowedRoutes:
        namespaces:
          from: All
