# HTTPRoute for the Argo CD UI/API.
# Routes arcd.example.com to the argocd-server service.
# This allows access to Argo CD through the platform gateway
# using the wildcard TLS certificate.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd-server
  namespace: argocd
spec:
  parentRefs:
    - name: platform-gateway
      namespace: istio-ingress
  hostnames:
    - "argocd.example.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: argocd-server
          port: 443
