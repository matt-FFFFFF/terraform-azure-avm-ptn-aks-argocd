{{- if .Values.httpRoute.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "team-service.fullname" . }}
  labels:
    {{- include "team-service.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.httpRoute.gateway.name }}
      namespace: {{ .Values.httpRoute.gateway.namespace }}
  {{- with .Values.httpRoute.hostname }}
  hostnames:
    - {{ . | quote }}
  {{- end }}
  rules:
    {{- range .Values.httpRoute.rules }}
    - matches:
        {{- toYaml .matches | nindent 8 }}
      backendRefs:
        - name: {{ include "team-service.fullname" $ }}
          port: {{ $.Values.service.port }}
    {{- end }}
{{- end }}
